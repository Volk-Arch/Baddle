<!-- Workspaces management modal — shared between Baddle and Lab. -->
<div id="workspaces-modal" class="weekly-modal" style="display:none" onclick="workspacesClose(event)">
  <div class="weekly-content" onclick="event.stopPropagation()">
    <div class="weekly-header">
      Мои графы <button class="weekly-close" onclick="workspacesClose()">×</button>
    </div>
    <div class="weekly-summary" style="font-size:12px;color:#a1a1aa">
      Каждый workspace — отдельный граф с нодами, embeddings и state_graph.
      Клик по строке = переключиться и открыть в graph-табе.
    </div>
    <div id="workspaces-list" class="workspaces-list"></div>
    <div class="baddle-quick-actions" style="margin-top:12px">
      <button class="activity-btn activity-btn-primary" onclick="workspaceNewPrompt()">＋ Новый workspace</button>
      <button class="activity-btn" onclick="workspacesOpen()">Обновить</button>
    </div>
  </div>
</div>
